name: One-off historical backfill

on:
  workflow_dispatch: {}   # manual "Run workflow" button only

permissions:
  contents: write

concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill (resumable — re-run this workflow if it fails partway)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: "1"   # stream prints to the live log immediately
        run: python backfill.py

      - name: Commit database
        if: always()   # keep partial progress even if a month failed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage.db
          git diff --cached --quiet || git commit -m "Historical backfill"
          git push
