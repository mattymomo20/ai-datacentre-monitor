name: Daily coverage run

on:
  schedule:
    - cron: "0 5 * * *"    # 05:00 UTC — even with GitHub's ~1h scheduler lag,
    - cron: "30 6 * * *"   # plus a 06:30 UTC catch-up, data is fresh before 8am UK
  workflow_dispatch: {}     # manual trigger button

permissions:
  contents: write

concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pull + classification
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          PYTHONUNBUFFERED: "1"   # stream prints to the live log immediately
        run: python daily.py

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage.db
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "Daily coverage: $(date -u +%F)"
          # Another run may have pushed while we worked — rebase and retry.
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected — pulling and retrying ($i)..."
            git pull --rebase -X ours origin main
            sleep 5
          done
          echo "push failed after retries"; exit 1
